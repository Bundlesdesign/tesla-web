<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tesla | Order Now</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'DM Sans', sans-serif; padding: 30px; background: #fff; }
        .hero-img { width: 100%; height: 300px; object-fit: cover; border-radius: 10px; margin-bottom: 20px; }
        .card-wrapper { perspective: 1000px; margin-bottom: 30px; }
        .payment-card { width: 100%; max-width: 350px; height: 200px; position: relative; transition: 0.6s; transform-style: preserve-3d; }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 15px; padding: 25px; color: #fff; display: flex; flex-direction: column; justify-content: space-between; }
        .card-front { background: linear-gradient(135deg, #0f172a, #1e293b); }
        .card-back { background: #1e293b; transform: rotateY(180deg); display: flex; align-items: center; justify-content: center; }
        .card-flipped { transform: rotateY(180deg); }
        .btn-blue { background: #3e6ae1; color: #fff; border: none; padding: 16px; border-radius: 5px; width: 100%; font-weight: 700; cursor: pointer; }
        input { width: 100%; padding: 14px; margin-bottom: 12px; border: 1px solid #eee; background: #f9f9f9; border-radius: 5px; }
    </style>
</head>
<body>
    <img id="him" class="hero-img">
    <h1 id="tn" style="margin-bottom:10px;"></h1>
    <h2 id="tp" style="color:var(--red); margin-bottom:30px;"></h2>

    <div class="card-wrapper">
        <div class="payment-card" id="pc">
            <div class="card-front">
                <div style="font-size:10px; letter-spacing:2px;">TESLA PREFERRED</div>
                <div id="cd" style="font-size:20px; letter-spacing:3px; margin:20px 0;">•••• •••• •••• ••••</div>
                <div style="display:flex; justify-content:space-between; font-size:12px;"><span>VALUED MEMBER</span><span>12/28</span></div>
            </div>
            <div class="card-back"><div style="width:100%; height:40px; background:#000; margin-bottom:20px;"></div><div style="background:#fff; color:#000; padding:5px; width:50px; text-align:center;">123</div></div>
        </div>
    </div>

    <input type="text" placeholder="Card Number" maxlength="19" oninput="upd(this)">
    <div style="display:flex; gap:10px;">
        <input type="text" placeholder="MM/YY" style="width:50%;">
        <input type="text" placeholder="CVV" style="width:50%;" onfocus="flip(true)" onblur="flip(false)">
    </div>
    <button class="btn-blue" onclick="place()">PLACE ORDER</button>

    <script>
        const id = new URLSearchParams(window.location.search).get('id');
        const cars = {
            m3: {n:'Model 3', p:36792, i:'https://images.unsplash.com/photo-1560958089-b8a1929cea89'},
            ms: {n:'Model S', p:71992, i:'https://images.unsplash.com/photo-1536700503339-1e4b06520771'}
            // Add other IDs to match index.html
        };
        const c = cars[id] || cars.m3;
        document.getElementById('him').src = c.i;
        document.getElementById('tn').innerText = c.n;
        document.getElementById('tp').innerText = '$' + c.p.toLocaleString();

        function upd(e) {
            let v = e.value.replace(/\D/g, '').replace(/(.{4})/g, '$1 ').trim();
            e.value = v; document.getElementById('cd').innerText = v || "•••• •••• •••• ••••";
        }
        function flip(b) { b ? document.getElementById('pc').classList.add('card-flipped') : document.getElementById('pc').classList.remove('card-flipped'); }
        function place() { alert("Order Confirmed!\nRef: TES-" + Math.random().toString(36).substr(2,8).toUpperCase()); location.href='index.html'; }
    </script>
</body>
</html>
