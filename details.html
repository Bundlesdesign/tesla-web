<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tesla | Product Details</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; font-family: 'DM Sans', sans-serif; }
        .hero { height: 60vh; width: 100%; object-fit: cover; }
        .content { padding: 48px; display: grid; grid-template-columns: 1fr 400px; gap: 60px; }
        .tab-btn { padding: 10px 20px; border: none; background: #f4f4f4; cursor: pointer; border-radius: 4px; margin-right: 5px; }
        .tab-btn.active { background: #171a20; color: #fff; }
        .payment-box { background: #f9f9f9; padding: 30px; border-radius: 8px; position: sticky; top: 100px; }
        .summary-dark { background: #171a20; color: #fff; padding: 20px; border-radius: 8px; margin-top: 20px; text-align: center; }
        /* Simple Card Mask */
        .card-preview { background: linear-gradient(135deg, #1e3a8a, #1e1b4b); height: 180px; border-radius: 12px; color: #fff; padding: 20px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <img id="car-hero" class="hero">
    <div class="content">
        <div>
            <h1 id="car-title" style="font-family:'DM Serif Display'; font-size: 56px;"></h1>
            <div style="display:flex; gap:30px; margin-top:20px; font-weight:bold;">
                <div>358mi <br><small style="font-weight:400">Range</small></div>
                <div>1.99s <br><small style="font-weight:400">0-60</small></div>
                <div>200mph <br><small style="font-weight:400">Top Speed</small></div>
            </div>
            <hr style="margin:40px 0; border:0; border-top:1px solid #eee;">
            <h3>Warranty</h3>
            <p>🛡️ Limited Warranty — 4 years / 50,000 miles</p>
            <p>⚡ Battery & Drive Unit — 8 years / 100,000 miles</p>
        </div>
        
        <div class="payment-box">
            <div style="margin-bottom:20px;">
                <button class="tab-btn active">Cash</button>
                <button class="tab-btn">Lease</button>
                <button class="tab-btn">Finance</button>
            </div>
            <h2 id="final-price" style="font-size:32px;">$0</h2>
            <p style="color:var(--red); font-size:12px; font-weight:700;">YOU SAVE $9,000 (20% OFF)</p>
            
            <div class="summary-dark">
                <p style="font-size:12px; opacity:0.8;">Estimated Payment</p>
                <h2 id="monthly-est">$0 / mo</h2>
            </div>
            <button class="btn-black" style="width:100%; padding:15px; margin-top:20px; background:#3e6ae1; color:#fff; border:none; border-radius:4px; font-weight:700; cursor:pointer;" onclick="alert('Proceeding to Order...')">Order Now</button>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const carId = params.get('id') || 'm3';
        const carData = {
            m3: { name: 'Model 3', price: 45990, img: 'https://images.unsplash.com/photo-1560958089-b8a1929cea89' },
            my: { name: 'Model Y', price: 54990, img: 'https://images.unsplash.com/photo-1619767886558-efdc259cde1a' }
            // Add other models here...
        };

        const car = carData[carId];
        document.getElementById('car-hero').src = car.img + '?auto=format&fit=crop&w=1200';
        document.getElementById('car-title').innerText = car.name;
        const discPrice = car.price * 0.8;
        document.getElementById('final-price').innerText = '$' + discPrice.toLocaleString();
        document.getElementById('monthly-est').innerText = '$' + Math.round(discPrice / 24).toLocaleString() + ' / mo';
    </script>
</body>
</html>
