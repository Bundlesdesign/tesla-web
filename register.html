<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Tesla — Create Account</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css"/>
</head>
<body style="min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:2rem;
  background:linear-gradient(135deg,#0a0a0a 0%,#111827 100%);">

<nav id="navbar" class="scrolled">
  <a class="nav-logo" href="index.html">TESL<span>A</span></a>
  <div class="nav-links"><a href="shop.html">Vehicles</a><a href="prize.html">Lucky Number</a></div>
  <div class="nav-right"><a href="login.html" id="nav-login">Sign In</a></div>
</nav>

<div style="margin-top:5rem;width:100%;max-width:480px;">
  <div class="form-card">
    <div class="form-title" id="reg-title-el">Create Account</div>

    <form id="register-form" novalidate>
      <div class="form-group">
        <label class="form-label" id="reg-name-label" for="reg-name">Full Name</label>
        <input class="form-input" id="reg-name" type="text" placeholder="John Doe" autocomplete="name"/>
        <p class="form-error" id="err-name"></p>
      </div>
      <div class="form-group">
        <label class="form-label" id="reg-email-label" for="reg-email">Email Address</label>
        <input class="form-input" id="reg-email" type="email" placeholder="you@example.com" autocomplete="email"/>
        <p class="form-error" id="err-email"></p>
      </div>
      <div class="form-group">
        <label class="form-label" id="reg-phone-label" for="reg-phone">Phone Number</label>
        <input class="form-input" id="reg-phone" type="tel" placeholder="+1 555 000 0000" autocomplete="tel"/>
        <p class="form-error" id="err-phone"></p>
      </div>
      <div class="form-group">
        <label class="form-label" id="reg-pass-label" for="reg-password">Password</label>
        <input class="form-input" id="reg-password" type="password" placeholder="Min. 6 characters" autocomplete="new-password"/>
        <p class="form-error" id="err-password"></p>
      </div>
      <button type="submit" id="reg-btn-el" class="btn btn-red w-full mt-4" style="padding:.8rem;">Create Account</button>
    </form>

    <p class="form-link">
      <span id="reg-link-el">Already have an account?</span>
      <a href="login.html" id="reg-signin-el"> Sign in</a>
    </p>
  </div>
</div>

<script type="module">
  import { initNav, initRegister } from './main.js';
  initNav();
  initRegister();
</script>
</body>
</html>
