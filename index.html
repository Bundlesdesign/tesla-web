<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tesla | Inventory</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
    <style>
        :root { --red: #E82127; --dark: #171a20; --grey: #393c41; --gold: #d4af37; }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'DM Sans', sans-serif; }
        body { background: #fff; color: var(--dark); }
        
        /* Tesla Loader */
        #loader { position: fixed; inset: 0; background: #fff; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .loader-arc { width: 80px; height: 80px; border: 2px solid #e2e2e2; border-top: 2px solid var(--grey); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Banners */
        .banner-gold { background: #fdf1ba; text-align: center; padding: 12px; font-size: 14px; font-weight: 500; position: relative; }
        .banner-red { background: var(--red); color: #fff; text-align: center; padding: 8px; font-size: 12px; font-weight: 700; letter-spacing: 1px; }

        /* Header */
        header { position: sticky; top: 0; background: rgba(255,255,255,0.9); backdrop-filter: blur(15px); padding: 15px 48px; display: flex; align-items: center; justify-content: space-between; z-index: 1000; }
        .logo svg { height: 18px; fill: var(--dark); cursor: pointer; }
        nav a { text-decoration: none; color: var(--dark); font-weight: 500; margin: 0 15px; font-size: 14px; }
        
        /* Grid */
        .hero-title { text-align: center; font-family: 'DM Serif Display', serif; font-size: 48px; margin: 40px 0 10px; }
        .inventory-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 40px; padding: 40px 48px; }
        .car-card { transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1); cursor: pointer; }
        .car-card:hover { transform: translateY(-8px); }
        .car-img { width: 100%; height: 240px; object-fit: cover; border-radius: 8px; }
        .price-new { color: var(--red); font-weight: 700; font-size: 1.2rem; }
        .savings-tag { background: #ffff00; padding: 4px 10px; border-radius: 4px; font-size: 11px; font-weight: 700; margin-top: 8px; display: inline-block; }
        .btn-black { background: #171a20; color: #fff; border: none; width: 100%; padding: 12px; border-radius: 4px; margin-top: 20px; font-weight: 500; cursor: pointer; }
    </style>
</head>
<body>
    <div id="loader"><div class="loader-arc"></div></div>

    <div class="banner-gold">0% APR Available · Learn More <span style="position:absolute; right:20px; cursor:pointer" onclick="this.parentElement.remove()">×</span></div>
    <div class="banner-red">🔥 20% OFF ALL INVENTORY — LIMITED TIME!</div>

    <header>
        <div class="logo"><svg viewBox="0 0 342 35"><path d="M0 .1a9.7 9.7 0 0 0 7 7h11l.5.1v27.6h12.5V7.2l.5-.1h11a9.7 9.7 0 0 0 7-7zM64 0c-2 0-3 1-4 2l-1 2-1 2v34h13V10h11v25h12V10h11v25h13V4l-1-2-1-2zm108 0h-13l-1 1-1 1V35h13V19h11v16h12V19h11v16h13V2l-1-1-1-1zm72 20V0h-13v35h40v-10h-27zm93-20h-13l-1 1-1 1v33l1 1 1 1h40v-10h-27v-5h27v-10h-27v-5h27V0z"></path></svg></div>
        <nav>
            <a href="index.html">Inventory</a>
            <a href="lucky.html">🎟️ Lucky Code</a>
            <a href="admin.html">Admin</a>
        </nav>
        <button id="auth-btn" style="background:none; border:1px solid #000; padding:8px 20px; border-radius:4px; cursor:pointer;">Sign In</button>
    </header>

    <h1 class="hero-title">New Inventory</h1>
    <p style="text-align:center; color:var(--grey)">5 Vehicles Available</p>

    <div class="inventory-grid" id="car-list"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAai8mFCTYpylV5DTSpBu2Grt_9Bfz_DWo",
            authDomain: "tesla1-5c71d.firebaseapp.com",
            projectId: "tesla1-5c71d",
            storageBucket: "tesla1-5c71d.firebasestorage.app",
            messagingSenderId: "998795417398",
            appId: "1:998795417398:web:ef046c3d8efaf054078597"
        };
        initializeApp(firebaseConfig);
        const auth = getAuth();

        const cars = [
            { id: 'm3', name: 'Model 3', price: 45990, img: 'https://images.unsplash.com/photo-1560958089-b8a1929cea89' },
            { id: 'my', name: 'Model Y', price: 54990, img: 'https://images.unsplash.com/photo-1619767886558-efdc259cde1a' },
            { id: 'ms', name: 'Model S', price: 89990, img: 'https://images.unsplash.com/photo-1536700503339-1e4b06520771' },
            { id: 'mx', name: 'Model X', price: 94990, img: 'https://images.unsplash.com/photo-1561580119-6199e33904fd' },
            { id: 'ct', name: 'Cybertruck', price: 69990, img: 'https://images.unsplash.com/photo-1594223274512-ad4803739b7c' }
        ];

        const grid = document.getElementById('car-list');
        grid.innerHTML = cars.map(car => `
            <div class="car-card" onclick="location.href='details.html?id=${car.id}'">
                <img src="${car.img}?auto=format&fit=crop&w=600" class="car-img">
                <div style="padding:20px 0;">
                    <h3 style="font-size:24px;">${car.name}</h3>
                    <p style="text-decoration:line-through; color:#888; font-size:14px;">$${car.price.toLocaleString()}</p>
                    <p class="price-new">$${(car.price * 0.8).toLocaleString()}</p>
                    <div class="savings-tag">Reduced by $${(car.price * 0.2).toLocaleString()}</div>
                    <button class="btn-black">View Details</button>
                </div>
            </div>
        `).join('');

        setTimeout(() => document.getElementById('loader').style.display = 'none', 1400);

        onAuthStateChanged(auth, user => {
            if (user) document.getElementById('auth-btn').innerText = 'My Tesla';
        });
    </script>
</body>
</html>
